version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: calvision
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: morhano11
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: dev-secret-key
      DEBUG: "True"
      DATABASE_URL: postgresql://postgres:password@db:5432/calvision
      USDA_API_KEY: DEMO_KEY
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata: